  build:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    - name: Update apt-get
      run: sudo apt-get update
    - name: Install deps
      run: sudo apt-get install coreutils quilt parted kpartx qemu-utils qemu-user-static debootstrap zerofree zip dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file git curl bc
    - run: mkdir .ccache
    - name: "Set up ccache cache"
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-${{ github.head_ref }}-${{ github.run_number }}
        restore-keys: |
          ccache-${{ github.head_ref }}
          ccache
    - run: ls -lah .ccache
    - name: Build
      run: sudo ./build.sh
    - uses: actions/upload-artifact@v4
      with:
        name: debs-qemu
        path: deploy/*.deb
    - uses: actions/upload-artifact@v4
      with:
        name: images-qemu
        path: deploy/*.zip
    - uses: actions/upload-artifact@v4
      with:
        name: packages-info-qemu
        path: deploy/*.info
    - uses: actions/upload-artifact@v4
      with:
        name: mixxx-version-qemu
        path: deploy/*.version
    - uses: actions/upload-artifact@v4
      with:
        name: mixxx-tag-qemu
        path: deploy/*.tag

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Download debs
      uses: actions/download-artifact@v4
      with:
        name: debs-qemu
        path: debs
    - name: Download images
      uses: actions/download-artifact@v4
      with:
        name: images-qemu
        path: images
    - name: Download packages-info
      uses: actions/download-artifact@v4
      with:
        name: packages-info-qemu
        path: info
    - name: Download mixxx-version
      uses: actions/download-artifact@v4
      with:
        name: mixxx-version-qemu
        path: version
    - name: Download mixxx-tag
      uses: actions/download-artifact@v4
      with:
        name: mixxx-tag-qemu
        path: tag
    - name: Get mixxx version
      id: mixxx-version
      run: |
        echo "COMMIT=$(cat version/*.version)" >> $GITHUB_OUTPUT
        echo "TAG=$(cat tag/*.tag)" >> $GITHUB_OUTPUT
    - name: Delete existing nightly release
      run: |
        if gh release view nightly --repo $GITHUB_REPOSITORY 2>/dev/null; then
          gh release delete nightly --repo $GITHUB_REPOSITORY --cleanup-tag --yes
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload to Nightly Release
      uses: ncipollo/release-action@v1
      with:
        tag: nightly
        name: Nightly (Mixxx ${{ steps.mixxx-version.outputs.TAG }})
        body: |
          ## Nightly Build
          - [Mixxx ${{ steps.mixxx-version.outputs.TAG }}](https://github.com/mixxxdj/mixxx/commit/${{ steps.mixxx-version.outputs.COMMIT }})
        prerelease: true
        omitDraftDuringUpdate: true
        artifacts: "debs/*,images/*,info/*,version/*"
        token: ${{ secrets.GITHUB_TOKEN }}
